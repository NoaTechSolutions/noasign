services:
  postgres:
    image: postgres:16-alpine
    container_name: noasign-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: noasign
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - noasign_postgres_local:/var/lib/postgresql/data

volumes:
  noasign_postgres_local:
