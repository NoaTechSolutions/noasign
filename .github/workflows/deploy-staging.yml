name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      seed_test_users:
        description: 'One-shot: run the staging test-user seed after deploy'
        type: boolean
        default: false

# Only one deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging VM
    runs-on: [self-hosted, linux, staging]
    environment: staging

    steps:
      - name: Deploy backend
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          echo "--- Pulling latest code ---"
          cd ~/apps/ntssign
          # Hard-reset to the remote: the VM is a deploy target, and `npm prune`
          # dirties package-lock.json, which makes `git pull` abort when a commit
          # also changes it. Reset discards that drift (untracked/gitignored files
          # like .env and prisma/seed.js are preserved).
          git fetch origin develop
          git reset --hard origin/develop

          echo "--- Building backend ---"
          cd apps/backend
          npm ci
          ./node_modules/.bin/prisma generate
          ./node_modules/.bin/prisma migrate deploy
          # nest-cli deleteOutDir wipes dist/ but not the incremental tsbuildinfo,
          # so a stale cache can make tsc NOOP and produce no output silently.
          rm -f tsconfig.build.tsbuildinfo
          npm run build
          test -f dist/main.js || { echo "ERROR: dist/main.js not produced by build"; exit 1; }
          # Compile the construction seed so prisma/seed.ts is the source of truth.
          # nest build excludes prisma/ (tsconfig.build.json), and prisma/seed.js is
          # gitignored, so without this the gated seed step would run a STALE seed.js.
          # This only GENERATES prisma/seed.js — it does NOT run the seed. Execution
          # stays gated behind the `seed_test_users` dispatch step below. Runs while
          # typescript (a devDep) is still installed, i.e. before the prune.
          echo "--- Compiling construction seed (prisma/seed.ts -> seed.js) ---"
          ./node_modules/.bin/tsc prisma/seed.ts --outDir prisma --module commonjs \
            --target es2021 --moduleResolution node --esModuleInterop --skipLibCheck
          test -f prisma/seed.js || { echo "ERROR: prisma/seed.js not produced"; exit 1; }
          npm prune --omit=dev

          echo "--- Reloading backend (zero-downtime) ---"
          pm2 reload ntssign-backend --update-env

          echo "--- Backend deploy complete ---"

      # Gated one-shot seed. ONLY runs when triggered via workflow_dispatch with
      # seed_test_users=true — never on normal pushes to develop. Idempotent +
      # non-destructive (upserts). bcrypt + @prisma/client are prod deps (survive
      # the dev-prune above). Sources the VM .env so the runtime scripts get
      # DATABASE_URL (the prisma CLI auto-loads it; node runtime does not).
      - name: Seed staging test users (one-shot, gated)
        if: github.event.inputs.seed_test_users == 'true'
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          # Extract ONLY DATABASE_URL from .env (do NOT `source` the whole file —
          # some lines aren't valid bash and break it). Strip optional quotes.
          DATABASE_URL="$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d '=' -f2-)"
          DATABASE_URL="${DATABASE_URL%\"}"; DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"; DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL
          echo "--- Seeding CONSTRUCTION_CONTRACT (doc type + form schema) ---"
          node prisma/seed.js
          echo "--- Seeding staging test users + customers ---"
          node scripts/dev-helpers/_seed-staging-test-users.js
          # Receipts: the PAYMENT_RECEIPT type + form come from the data migration
          # (20260609130000, applied by `prisma migrate deploy` above). Here we only
          # wire the per-tenant ReceiptTemplate for the World Pavers staging company.
          # Runs AFTER the user seed so the company exists. Non-master users see
          # Receipt company-wide (getDocumentTypes), so no per-user config is needed.
          echo "--- Seeding World Pavers ReceiptTemplate ---"
          node scripts/dev-helpers/_seed-receipt-template.js 7aaad16a-6d76-4c36-97c7-b9ce3e45b801

      - name: Deploy frontend
        timeout-minutes: 20
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Build-time tag so staging errors never mix with prod. NOT a secret.
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: staging
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          echo "--- Pulling latest code ---"
          cd ~/apps/ntssign
          # Hard-reset to the remote: the VM is a deploy target, and `npm prune`
          # dirties package-lock.json, which makes `git pull` abort when a commit
          # also changes it. Reset discards that drift (untracked/gitignored files
          # like .env and prisma/seed.js are preserved).
          git fetch origin develop
          git reset --hard origin/develop

          echo "--- Building frontend ---"
          cd apps/frontend
          npm ci
          NEXT_PUBLIC_APP_URL=https://app-staging.ntssign.com NODE_OPTIONS="--max-old-space-size=512" npm run build

          echo "--- Reloading frontend (zero-downtime) ---"
          pm2 reload ntssign-frontend --update-env

          echo "--- Frontend deploy complete ---"
