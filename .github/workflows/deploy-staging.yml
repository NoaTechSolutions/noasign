name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      seed_test_users:
        description: 'One-shot: run the staging test-user seed after deploy'
        type: boolean
        default: false
      set_tenant_plan:
        description: 'One-shot: assign a plan + receipt fields to a staging tenant'
        type: boolean
        default: false
      stp_company_id:
        description: 'set_tenant_plan: CompanyProfile.id (default = World Pavers staging)'
        type: string
        default: '7aaad16a-6d76-4c36-97c7-b9ce3e45b801'
      stp_plan:
        description: 'set_tenant_plan: plan to assign'
        type: choice
        default: STARTER
        options:
          - STARTER
          - LAUNCH
          - PRO
          - SCALE
          - PRO_UNLIMITED
          - PAY_PER_CONTRACT
          - RECEIPTS_ONLY
      stp_receipt_limit:
        description: 'set_tenant_plan: receipt-limit override (blank = plan default; e.g. 2 for fast overage)'
        type: string
        default: ''
      stp_dry_run:
        description: 'set_tenant_plan: preview only (uncheck to apply)'
        type: boolean
        default: true
      seed_receipt_catalog:
        description: 'One-shot: seed the 3 standard receipt designs + wire them per-tenant'
        type: boolean
        default: false
      rc_company_id:
        description: 'seed_receipt_catalog: CompanyProfile.id to wire (default = World Pavers staging)'
        type: string
        default: '7aaad16a-6d76-4c36-97c7-b9ce3e45b801'
      rc_default_slug:
        description: 'seed_receipt_catalog: which design becomes the tenant default'
        type: choice
        default: receipt-basic-v1
        options:
          - receipt-basic-v1
          - receipt-moderno-v1
          - receipt-basic-v2
      templates_visibility_setup:
        description: 'One-shot: seed template catalog + make receipt-classic PRIVATE to World Pavers (Templates visibility)'
        type: boolean
        default: false
      tvs_wpc_company_id:
        description: 'templates_visibility_setup: World Pavers CompanyProfile.id that owns receipt-classic'
        type: string
        default: 'a6150399-8bd8-4b26-88fc-0f3d38acc1ea'

# Only one deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging VM
    runs-on: [self-hosted, linux, staging]
    environment: staging

    steps:
      - name: Deploy backend
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          echo "--- Pulling latest code ---"
          cd ~/apps/ntssign
          # Hard-reset to the remote: the VM is a deploy target, and `npm prune`
          # dirties package-lock.json, which makes `git pull` abort when a commit
          # also changes it. Reset discards that drift (untracked/gitignored files
          # like .env and prisma/seed.js are preserved).
          git fetch origin develop
          git reset --hard origin/develop

          echo "--- Building backend ---"
          cd apps/backend
          npm ci
          ./node_modules/.bin/prisma generate
          ./node_modules/.bin/prisma migrate deploy
          # nest-cli deleteOutDir wipes dist/ but not the incremental tsbuildinfo,
          # so a stale cache can make tsc NOOP and produce no output silently.
          rm -f tsconfig.build.tsbuildinfo
          npm run build
          test -f dist/main.js || { echo "ERROR: dist/main.js not produced by build"; exit 1; }
          # Compile the construction seed so prisma/seed.ts is the source of truth.
          # nest build excludes prisma/ (tsconfig.build.json), and prisma/seed.js is
          # gitignored, so without this the gated seed step would run a STALE seed.js.
          # This only GENERATES prisma/seed.js — it does NOT run the seed. Execution
          # stays gated behind the `seed_test_users` dispatch step below. Runs while
          # typescript (a devDep) is still installed, i.e. before the prune.
          echo "--- Compiling construction seed (prisma/seed.ts -> seed.js) ---"
          ./node_modules/.bin/tsc prisma/seed.ts --outDir prisma --module commonjs \
            --target es2021 --moduleResolution node --esModuleInterop --skipLibCheck
          test -f prisma/seed.js || { echo "ERROR: prisma/seed.js not produced"; exit 1; }
          npm prune --omit=dev

          echo "--- Reloading backend (zero-downtime) ---"
          pm2 reload ntssign-backend --update-env

          echo "--- Backend deploy complete ---"

      # Gated one-shot: seed the 3 standard receipt designs into the catalog and
      # wire them per-tenant (unlike _seed-receipt-template.js which hardcodes the
      # legacy WPC classic). ONLY runs with seed_receipt_catalog=true — never on
      # normal pushes. Idempotent (upserts). Runs after the backend build so the
      # built dist + prod deps are present; sources the VM .env for DATABASE_URL.
      - name: Seed receipt catalog + wire designs (one-shot, gated)
        if: github.event.inputs.seed_receipt_catalog == 'true'
        env:
          RC_COMPANY_ID: ${{ github.event.inputs.rc_company_id }}
          RC_DEFAULT_SLUG: ${{ github.event.inputs.rc_default_slug }}
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          DATABASE_URL="$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d '=' -f2-)"
          DATABASE_URL="${DATABASE_URL%\"}"; DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"; DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL
          echo "--- PRE-SEED safety dump of affected tables (captured in run logs) ---"
          node scripts/dev-helpers/_dump-receipt-tables.js "$RC_COMPANY_ID"
          echo "--- Seeding the 3 standard receipt designs into the catalog ---"
          node scripts/seed-template-catalog.js
          echo "--- Wiring per-tenant receipt templates from the new standards (default=$RC_DEFAULT_SLUG) ---"
          node scripts/dev-helpers/_wire-receipt-standards.js "$RC_COMPANY_ID" "$RC_DEFAULT_SLUG"

      # Gated one-shot for the Templates module go-live: (b) seed the catalog
      # (idempotent upsert; does NOT touch ownership or card PNGs) and (c) make
      # receipt-classic PRIVATE to World Pavers so the visibility filter hides it
      # from other tenants. Surgical — no legacy per-tenant wire (the new resolver
      # self-heals via ensureActive). Does a safety dump first. NEVER runs the
      # thumbnail generator (card PNGs are owner-managed). ONLY on explicit dispatch.
      - name: Templates visibility setup (one-shot, gated)
        if: github.event.inputs.templates_visibility_setup == 'true'
        env:
          TVS_WPC_ID: ${{ github.event.inputs.tvs_wpc_company_id }}
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          DATABASE_URL="$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d '=' -f2-)"
          DATABASE_URL="${DATABASE_URL%\"}"; DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"; DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL
          echo "--- PRE-SETUP safety dump of affected tables (captured in run logs) ---"
          node scripts/dev-helpers/_dump-receipt-tables.js "$TVS_WPC_ID"
          echo "--- (b) Seeding the standard receipt/invoice catalog (idempotent upsert) ---"
          node scripts/seed-template-catalog.js
          echo "--- (c) Making receipt-classic PRIVATE to World Pavers ($TVS_WPC_ID) ---"
          node scripts/associate-template-owner.js receipt-classic "$TVS_WPC_ID"

      # Gated one-shot seed. ONLY runs when triggered via workflow_dispatch with
      # seed_test_users=true — never on normal pushes to develop. Idempotent +
      # non-destructive (upserts). bcrypt + @prisma/client are prod deps (survive
      # the dev-prune above). Sources the VM .env so the runtime scripts get
      # DATABASE_URL (the prisma CLI auto-loads it; node runtime does not).
      - name: Seed staging test users (one-shot, gated)
        if: github.event.inputs.seed_test_users == 'true'
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          # Extract ONLY DATABASE_URL from .env (do NOT `source` the whole file —
          # some lines aren't valid bash and break it). Strip optional quotes.
          DATABASE_URL="$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d '=' -f2-)"
          DATABASE_URL="${DATABASE_URL%\"}"; DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"; DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL
          echo "--- Seeding CONSTRUCTION_CONTRACT (doc type + form schema) ---"
          node prisma/seed.js
          echo "--- Seeding staging test users + customers ---"
          node scripts/dev-helpers/_seed-staging-test-users.js
          # Receipts: the PAYMENT_RECEIPT type + form come from the data migration
          # (20260609130000, applied by `prisma migrate deploy` above). Here we only
          # wire the per-tenant ReceiptTemplate for the World Pavers staging company.
          # Runs AFTER the user seed so the company exists. Non-master users see
          # Receipt company-wide (getDocumentTypes), so no per-user config is needed.
          echo "--- Seeding World Pavers ReceiptTemplate ---"
          node scripts/dev-helpers/_seed-receipt-template.js 7aaad16a-6d76-4c36-97c7-b9ce3e45b801
          # The other 3 of the 4 account/plan combinations (personal-individual,
          # receipts-personal, receipts-business), each on its own company so plan +
          # accountType are unambiguous. World Pavers stays the business-normal one.
          echo "--- Seeding staging 4-type test users ---"
          node scripts/dev-helpers/_seed-staging-4type-users.js
          # Wire a per-tenant ReceiptTemplate for the two RECEIPTS_ONLY tenants so
          # they can actually issue receipts (company ids from _seed-staging-4type-users.js).
          echo "--- Wiring ReceiptTemplate for the RECEIPTS_ONLY staging tenants ---"
          node scripts/dev-helpers/_seed-receipt-template.js 5ad11000-0000-4000-8000-000000000002
          node scripts/dev-helpers/_seed-receipt-template.js 5ad11000-0000-4000-8000-000000000003

      # Gated one-shot: assign a plan + receipt fields to a staging tenant so the
      # owner can validate Model C (overage / RECEIPTS_ONLY). DRY_RUN by default;
      # uncheck stp_dry_run to apply. Uses the built dist (PLAN_DEFAULTS) + prod
      # deps that survive the prune above.
      - name: Set tenant plan (one-shot, gated)
        if: github.event.inputs.set_tenant_plan == 'true'
        env:
          COMPANY_ID: ${{ github.event.inputs.stp_company_id }}
          PLAN: ${{ github.event.inputs.stp_plan }}
          MONTHLY_RECEIPT_LIMIT: ${{ github.event.inputs.stp_receipt_limit }}
          DRY_RUN: ${{ github.event.inputs.stp_dry_run }}
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          DATABASE_URL="$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d '=' -f2-)"
          DATABASE_URL="${DATABASE_URL%\"}"; DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"; DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL
          node scripts/set-tenant-plan.js

      - name: Deploy frontend
        # 40min (was 20): on a swap-bound VM the 512MB-capped front build hits
        # exactly 20min intermittently. This build bakes the Sentry DSN, so a
        # mid-build timeout would ship a DSN-less bundle. Headroom, not a fix.
        timeout-minutes: 40
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Build-time tag so staging errors never mix with prod. NOT a secret.
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: staging
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          echo "--- Pulling latest code ---"
          cd ~/apps/ntssign
          # Hard-reset to the remote: the VM is a deploy target, and `npm prune`
          # dirties package-lock.json, which makes `git pull` abort when a commit
          # also changes it. Reset discards that drift (untracked/gitignored files
          # like .env and prisma/seed.js are preserved).
          git fetch origin develop
          git reset --hard origin/develop

          echo "--- Building frontend ---"
          cd apps/frontend
          npm ci
          NEXT_PUBLIC_APP_URL=https://app-staging.ntssign.com NODE_OPTIONS="--max-old-space-size=512" npm run build

          echo "--- Reloading frontend (zero-downtime) ---"
          pm2 reload ntssign-frontend --update-env

          echo "--- Frontend deploy complete ---"
