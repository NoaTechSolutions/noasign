name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging VM
    runs-on: [self-hosted, linux, staging]
    environment: staging

    steps:
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "--- Pulling latest code ---"
            cd ~/apps/ntssign
            git pull origin develop

            echo "--- Building backend ---"
            cd apps/backend
            npm ci
            ./node_modules/.bin/prisma generate
            ./node_modules/.bin/prisma migrate deploy
            # nest-cli deleteOutDir wipes dist/ but not the incremental tsbuildinfo,
            # so a stale cache can make tsc NOOP and produce no output silently.
            rm -f tsconfig.build.tsbuildinfo
            npm run build
            test -f dist/main.js || { echo "ERROR: dist/main.js not produced by build"; exit 1; }
            npm prune --omit=dev

            echo "--- Reloading backend (zero-downtime) ---"
            pm2 reload ntssign-backend --update-env

            echo "--- Backend deploy complete ---"

      - name: Deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "--- Pulling latest code ---"
            cd ~/apps/ntssign
            git pull origin develop

            echo "--- Building frontend ---"
            cd apps/frontend
            npm ci
            NEXT_PUBLIC_APP_URL=https://app-staging.ntssign.com NODE_OPTIONS="--max-old-space-size=512" npm run build

            echo "--- Reloading frontend (zero-downtime) ---"
            pm2 reload ntssign-frontend --update-env

            echo "--- Frontend deploy complete ---"
