name: Deploy Landing to SiteGround

on:
  # Auto-deploy on push to main when landing-related files change
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'scripts/export-landing.sh'
      - '.github/workflows/deploy-landing.yml'

  # Allow manual trigger from Actions UI (for testing and ad-hoc deploys)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd apps/frontend && npm ci

      - name: Build static export via script
        # scripts/export-landing.sh temporarily patches next.config.ts (output: export),
        # neuters proxy.ts, adds force-static to dynamic routes, builds, copies the
        # result to landing-export/, and restores all original files via `trap restore EXIT`.
        timeout-minutes: 20
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_API_URL: 'https://api.ntssign.com'
        run: bash scripts/export-landing.sh

      - name: Prune unreferenced PNG sources (keep only responsive variants)
        # The responsive srcSet references *-sm/md/lg/xl files, not the base PNGs.
        # The upscaled base PNGs are 10+ MB each and waste SiteGround space.
        run: |
          cd landing-export/img
          rm -f hero-3d.png security-3d.png workflow-3d.png devices-3d.png \
                hero-3d.webp security-3d.webp workflow-3d.webp devices-3d.webp \
                NTSSign_azul_fondoTrasparente.svg \
                NTSSign_blanco_fondoazulDark.svg \
                NTSSign_blanco_fondoTransparente.svg \
                logo-dark.svg logo-transparent.svg
          ls -lh | head -20

      - name: Write .htaccess for SiteGround (cache + gzip + HTTPS + security headers)
        run: |
          cat > landing-export/.htaccess << 'HTACCESS'
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType image/x-icon "access plus 1 year"
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>
          <IfModule mod_headers.c>
            <FilesMatch "\.(js|css|woff2)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
            <FilesMatch "\.(png|jpg|svg|webp|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
            <FilesMatch "\.html$">
              Header set Cache-Control "no-cache, must-revalidate"
            </FilesMatch>
            Header always set X-Content-Type-Options "nosniff"
            Header always set X-Frame-Options "SAMEORIGIN"
            Header always set Referrer-Policy "strict-origin-when-cross-origin"
            Header always set X-XSS-Protection "1; mode=block"
          </IfModule>
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript image/svg+xml
          </IfModule>
          RewriteEngine On
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          HTACCESS

      - name: Verify export output
        run: |
          echo "=== Total size ==="
          du -sh landing-export
          echo "=== Key files ==="
          ls -la landing-export/index.html landing-export/.htaccess
          echo "=== Image variants ==="
          ls landing-export/img/ | head -30

      - name: Deploy to SiteGround via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.noatechsolutions.com
          username: ${{ secrets.SITEGROUND_USER }}
          password: ${{ secrets.SITEGROUND_PASSWORD }}
          port: 21
          local-dir: ./landing-export/
          server-dir: /public_html/ntssign/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
