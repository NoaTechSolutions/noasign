name: Prod maintenance (manual)

# Manual, runner-on-the-VM maintenance for the prod release. Pick a step and run.
# Runs ON the prod self-hosted runner (no SSH needed). Run them IN ORDER:
#   1) backup  → 2) orphan-check  → 3) set-env
on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Step to run (in order)'
        type: choice
        required: true
        options:
          - schema-diag
          - backup
          - orphan-check
          - set-env
          - post-deploy-check
          - receipts-readiness

concurrency:
  group: prod-maintenance
  cancel-in-progress: false

jobs:
  # 5) Read-only: can these users create receipts? Reports their tenants/roles,
  #    whether the PAYMENT_RECEIPT type+form exist, and each tenant's receipt
  #    templates + the users' doc configs. Uses Prisma (exact field names).
  receipts-readiness:
    if: github.event.inputs.step == 'receipts-readiness'
    name: Receipts readiness (read-only)
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - name: Report receipt config state
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/apps/ntssign/apps/backend
          DB="$(grep -m1 -E '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env | sed -E 's/^[[:space:]]*DATABASE_URL[[:space:]]*=[[:space:]]*//; s/^"//; s/"$//; s/^'"'"'//; s/'"'"'$//')"
          DATABASE_URL="$DB" node -e '
            const { PrismaClient } = require("@prisma/client");
            const p = new PrismaClient();
            (async () => {
              const emails = ["admin@noatechsolutions.com", "worldpaversco@gmail.com"];
              const users = await p.user.findMany({ where: { email: { in: emails } }, select: { id:true, email:true, role:true, companyProfileId:true, companyProfile:{ select:{ companyName:true } } } });
              console.log("=== USERS ==="); console.log(JSON.stringify(users, null, 2));
              const dt = await p.documentType.findUnique({ where: { code: "PAYMENT_RECEIPT" }, include: { formDefinitions: { where: { isActive: true }, select: { id:true } } } });
              console.log("=== PAYMENT_RECEIPT type ==="); console.log(dt ? JSON.stringify({ id: dt.id, mode: dt.generationMode, activeForms: dt.formDefinitions.length }) : "MISSING (must seed docType + form on prod first)");
              for (const u of users) {
                if (!u.companyProfileId) { console.log(u.email, "-> no companyProfileId"); continue; }
                const rt = await p.receiptTemplate.findMany({ where: { companyProfileId: u.companyProfileId }, select: { name:true, isActive:true, basePdfPath:true } });
                const cfg = await p.userDocumentConfig.findMany({ where: { userId: u.id }, include: { documentType: { select: { code:true } } } });
                console.log("=== " + u.email + " | tenant " + (u.companyProfile && u.companyProfile.companyName) + " (" + u.companyProfileId + ") | role " + u.role + " ===");
                console.log("  ReceiptTemplates:", JSON.stringify(rt));
                console.log("  UserDocumentConfigs:", JSON.stringify(cfg.map(c => ({ type: c.documentType && c.documentType.code, active: c.isActive }))));
              }
              await p.$disconnect();
            })().catch(e => { console.error("ERR", e.message); process.exit(1); });
          '

  # 4) Read-only post-deploy verification: existing prod documents untouched by
  #    the additive migrations (status distribution + supersededAt all NULL +
  #    WorldPaver docs if that tenant exists).
  post-deploy-check:
    if: github.event.inputs.step == 'post-deploy-check'
    name: Post-deploy data check (read-only)
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - name: Verify documents intact
        run: |
          cd ~/apps/ntssign/apps/backend
          DB="$(grep -m1 -E '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env | sed -E 's/^[[:space:]]*DATABASE_URL[[:space:]]*=[[:space:]]*//; s/^"//; s/"$//; s/^'"'"'//; s/'"'"'$//')"
          if [ -z "$DB" ]; then echo "ERROR: could not read DATABASE_URL"; exit 1; fi
          echo "=== documents by status (existing docs intact) ==="
          psql "$DB" -c "SELECT status, count(*) FROM \"documents\" GROUP BY status ORDER BY status;" || echo "(query failed)"
          echo "=== docs voided right after deploy (expect 0) ==="
          psql "$DB" -c "SELECT count(*) AS docs_with_supersededAt FROM \"documents\" WHERE \"supersededAt\" IS NOT NULL;" || echo "(query failed)"
          echo "=== WorldPaver docs (if the tenant exists on prod) — statuses + supersededAt NULL ==="
          psql "$DB" -c "SELECT d.\"documentNumber\", d.status, d.\"supersededAt\" FROM \"documents\" d JOIN \"company_profiles\" cp ON cp.id = d.\"companyProfileId\" WHERE cp.\"companyName\" ILIKE '%World Paver%' ORDER BY d.\"createdAt\" DESC LIMIT 10;" || echo "(query failed)"

  # 0) Read-only ground-truth diagnostic of the REAL prod schema. NO set -e and
  #    every query has `|| true`, so it prints ALL output even if one query fails.
  schema-diag:
    if: github.event.inputs.step == 'schema-diag'
    name: Prod schema diagnostic (read-only)
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - name: Dump real prod schema state
        run: |
          cd ~/apps/ntssign/apps/backend
          echo "=== DATABASE_URL present in .env? (count, value not shown) ==="
          grep -cE '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env || true
          # Lenient extraction (tolerate leading spaces / spaces around '=' / quotes),
          # like the backup script's loader. No set -e so we always see output.
          DB="$(grep -m1 -E '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env | sed -E 's/^[[:space:]]*DATABASE_URL[[:space:]]*=[[:space:]]*//; s/^"//; s/"$//; s/^'"'"'//; s/'"'"'$//')"
          if [ -z "$DB" ]; then echo "ERROR: could not read DATABASE_URL from .env"; exit 1; fi
          echo "=== (a) Applied migrations on prod ==="
          psql "$DB" -c "SELECT migration_name FROM \"_prisma_migrations\" ORDER BY finished_at;" || echo "(query a failed)"
          echo "=== (b) customers columns (no rows = table does not exist) ==="
          psql "$DB" -c "SELECT column_name FROM information_schema.columns WHERE table_name='customers' ORDER BY ordinal_position;" || echo "(query b failed)"
          echo "=== (c) customers row count ==="
          psql "$DB" -c "SELECT count(*) AS customers_rows FROM \"customers\";" || echo "(no customers table / query c failed)"
          echo "=== (d) createdByUserId backfill readiness (only meaningful if customers exists) ==="
          psql "$DB" -c "SELECT to_regclass('public.customers') AS customers_table;" || true

  # 1) Fresh prod DB backup → R2, before the release.
  backup:
    if: github.event.inputs.step == 'backup'
    name: Backup prod DB to R2
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - name: Run backup + verify object in R2
        run: |
          set -euo pipefail
          cd ~/apps/ntssign
          bash scripts/backup-postgres-to-r2.sh
          echo "--- Verify the .dump landed in R2 ---"
          cd apps/backend
          # grep -m1 (NOT `grep | head`): head closes the pipe early, grep gets
          # SIGPIPE, and pipefail+set -e would kill the script silently.
          val() { grep -m1 -E "^$1=" .env | cut -d= -f2-; }
          AWS_ACCESS_KEY_ID="$(val R2_ACCESS_KEY_ID)" \
          AWS_SECRET_ACCESS_KEY="$(val R2_SECRET_ACCESS_KEY)" \
          AWS_DEFAULT_REGION=auto \
            aws s3 ls "s3://$(val R2_BUCKET)/backups/prod/" --endpoint-url "$(val R2_ENDPOINT)" | tail -5
          echo "GATE: a .dump with today's timestamp must be listed above."

  # 2) Read-only: customers that would break the userId NOT NULL backfill.
  orphan-check:
    if: github.event.inputs.step == 'orphan-check'
    name: Orphan-customers pre-check (read-only)
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - name: Count orphan customers
        run: |
          cd ~/apps/ntssign/apps/backend
          # Lenient DB extraction (tolerate leading spaces / spaces around '=' /
          # quotes) — a strict '^DATABASE_URL=' grep that misses the line would
          # exit 1 and (under set -e) kill the script before psql. No set -e here.
          DB="$(grep -m1 -E '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env | sed -E 's/^[[:space:]]*DATABASE_URL[[:space:]]*=[[:space:]]*//; s/^"//; s/"$//; s/^'"'"'//; s/'"'"'$//')"
          if [ -z "$DB" ]; then echo "ERROR: could not read DATABASE_URL from .env"; exit 1; fi
          echo "--- Orphan customers (createdByUserId NULL AND no MASTER in tenant) ---"
          # Defensive: if prod's April schema has no customers table yet (the
          # module arrives with the pending migrations), report 0 instead of
          # erroring — 0 customers = 0 orphans = the NOT NULL backfill runs on
          # an empty/created table, which is safe.
          psql "$DB" -v ON_ERROR_STOP=1 -c "
            SELECT CASE
              WHEN to_regclass('public.customers') IS NULL THEN 0
              ELSE (
                SELECT count(*) FROM \"customers\" c
                WHERE c.\"createdByUserId\" IS NULL
                  AND NOT EXISTS (
                    SELECT 1 FROM \"users\" u
                    WHERE u.\"companyProfileId\" = c.\"companyProfileId\"
                      AND u.\"role\" = 'MASTER')
              )
            END AS orphan_customers;"
          echo "GATE: orphan_customers = 0 → safe to migrate. > 0 → STOP and fix before the release."

  # 3) Write the 5 new env vars (from GitHub Secrets) into the prod .env + reload.
  #    SAFEGUARDS: values never printed; only the 5 keys touched; idempotent;
  #    .env backed up first; fails on an empty secret.
  set-env:
    if: github.event.inputs.step == 'set-env'
    name: Set R2_DOCS_* + RESEND_WEBHOOK_SECRET in prod .env
    runs-on: [self-hosted, linux, production]
    environment: production
    env:
      RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
      R2_DOCS_BUCKET: ${{ secrets.R2_DOCS_BUCKET }}
      R2_DOCS_ACCESS_KEY_ID: ${{ secrets.R2_DOCS_ACCESS_KEY_ID }}
      R2_DOCS_SECRET_ACCESS_KEY: ${{ secrets.R2_DOCS_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - name: Upsert env vars (idempotent, values never printed) + reload
        run: |
          set -euo pipefail
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          ENV_FILE=~/apps/ntssign/apps/backend/.env
          test -f "$ENV_FILE"
          cp "$ENV_FILE" "$ENV_FILE.bak.$(date -u +%Y%m%d%H%M%S)"

          upsert() {
            local key="$1" val="$2"
            if [ -z "$val" ]; then
              echo "ERROR: secret $key is empty — set it in GitHub Secrets first."; exit 1
            fi
            grep -vE "^${key}=" "$ENV_FILE" > "$ENV_FILE.tmp" || true   # drop existing line if any
            printf '%s=%s\n' "$key" "$val" >> "$ENV_FILE.tmp"          # append the new value
            mv "$ENV_FILE.tmp" "$ENV_FILE"
          }

          upsert RESEND_WEBHOOK_SECRET     "$RESEND_WEBHOOK_SECRET"
          upsert R2_DOCS_BUCKET            "$R2_DOCS_BUCKET"
          upsert R2_DOCS_ACCESS_KEY_ID     "$R2_DOCS_ACCESS_KEY_ID"
          upsert R2_DOCS_SECRET_ACCESS_KEY "$R2_DOCS_SECRET_ACCESS_KEY"
          upsert R2_ACCOUNT_ID             "$R2_ACCOUNT_ID"

          echo "--- Keys present (1 = ok); values NOT printed ---"
          for k in RESEND_WEBHOOK_SECRET R2_DOCS_BUCKET R2_DOCS_ACCESS_KEY_ID R2_DOCS_SECRET_ACCESS_KEY R2_ACCOUNT_ID; do
            printf '%s=%s\n' "$k" "$(grep -cE "^${k}=" "$ENV_FILE")"
          done
          echo "--- Backup var R2_BUCKET untouched (expect 1) ---"
          printf 'R2_BUCKET present: %s\n' "$(grep -cE '^R2_BUCKET=' "$ENV_FILE")"

          echo "--- Reload backend so it picks up the new vars ---"
          pm2 reload ntssign-backend --update-env
          echo "GATE: every key above = 1, R2_BUCKET = 1, reload OK."
