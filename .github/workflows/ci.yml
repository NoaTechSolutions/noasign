name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ntssign

      - name: Run unit tests
        run: npm test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ntssign
          JWT_SECRET: ci-test-secret-not-used-in-real-env
          NODE_ENV: test

  backend-e2e:
    name: Backend e2e (real DB)
    runs-on: ubuntu-latest

    # Real Postgres — the whole point of these tests (a mocked DB can be green
    # while the real thing is broken). Runs in PARALLEL with the other jobs, so it
    # adds to the CI wall-clock only if it's the slowest; it never touches the
    # separate deploy workflow.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: noasign_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/noasign_test

      # globalSetup db-pushes the schema onto the fresh service DB before the suites.
      - name: Run e2e tests (real DB)
        run: npm run test:e2e
        working-directory: apps/backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/noasign_test
          JWT_SECRET: ci-e2e-secret-not-used-in-real-env
          NODE_ENV: test

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Lint
        run: npm run lint
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
